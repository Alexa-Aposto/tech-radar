theme: jekyll-theme-cayman
title: Tech Radar
description: AI-curated intelligence briefing
baseurl: "/tech-radar"
url: "https://alexa-aposto.github.io"

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
